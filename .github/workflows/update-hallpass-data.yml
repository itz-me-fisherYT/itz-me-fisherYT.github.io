name: Update HallPass SMP data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Generate HallPass snapshot
        env:
          HALLPASS_API_BASE: http://147.189.171.246:25719
          HALLPASS_API_KEY: ${{ secrets.HALLPASS_API_KEY }}
          HALLPASS_PLAYERS: ${{ vars.HALLPASS_PLAYERS }}
        run: python .github/scripts/update_hallpass_data.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hallpasssmp/data/status.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Update HallPass SMP data snapshot"
            git push
          fi
